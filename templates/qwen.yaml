# Qwen 2.5 1.5B Instruct — tiny, fast chat model (~1 GB).
# Source: bartowski/Qwen2.5-1.5B-Instruct-GGUF
# Recommended: any hardware. Switch to the 7B repo (commented below) for ~16 GB VRAM.
version: 1
name: qwen
backend: llama
mode: interactive
model:
  source: huggingface
  repo: bartowski/Qwen2.5-1.5B-Instruct-GGUF
  file: Qwen2.5-1.5B-Instruct-Q4_K_M.gguf         # 1.0GB
  # repo: bartowski/Qwen2.5-7B-Instruct-GGUF
  # file: Qwen2.5-7B-Instruct-Q4_K_M.gguf         # 4.7GB — optimum for 16GB VRAM
  download:
    resume: true
hardware_profiles:
  nvidia:
    n_gpu_layers: 99
    cuda: true
  apple_silicon:
    n_gpu_layers: 99
    metal: true
  cpu:
    n_gpu_layers: 0
