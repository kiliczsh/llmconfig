version: 1
name: phi
backend: llama
mode: interactive
model:
  source: huggingface
  repo: bartowski/phi-4-mini-instruct-GGUF
  file: phi-4-mini-instruct-Q4_K_M.gguf           # 2.3GB
  # file: phi-4-mini-instruct-Q8_0.gguf           # 4.6GB — optimum for 16GB VRAM
  download:
    resume: true
hardware_profiles:
  apple_silicon:
    n_gpu_layers: 99
    metal: true
  nvidia:
    n_gpu_layers: 99
    cuda: true
  cpu:
    n_gpu_layers: 0
