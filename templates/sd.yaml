version: 1
name: sd
backend: sd
mode: server
model:
  source: url
  url: https://huggingface.co/runwayml/stable-diffusion-v1-5/resolve/main/v1-5-pruned-emaonly.safetensors
  file: v1-5-pruned-emaonly.safetensors   # 4.3GB — SD 1.5 classic checkpoint
  download:
    resume: true
server:
  host: 127.0.0.1
  port: 8091
sd:
  width: 512
  height: 512
  steps: 20
  cfg_scale: 7.0
  sampling_method: euler_a
  seed: -1
hardware_profiles:
  nvidia:
    n_gpu_layers: 99
    cuda: true
  apple_silicon:
    n_gpu_layers: 99
    metal: true
  cpu:
    n_gpu_layers: 0
