# llamaconfig reference — sd backend, interactive/cli mode (sd-cli)
# Copy to ~/.llamaconfig/configs/<name>.yaml and fill in required fields.
# Required: version, name, model.source + repo/file/path/url
#
# ── Two ways to supply the weights ───────────────────────────────────────────
# 1) SD1.x / SDXL: a single unified checkpoint goes in `model.file`. It is
#    passed to sd-cli as --model.
# 2) Flux / SD3:   the diffusion weights are still the main `model.file`, but
#    you MUST also provide the text encoders (clip_l, t5xxl) and VAE via the
#    `sd.*` block. llamaconfig detects this layout and switches --model for
#    --diffusion-model automatically.
#
# Auxiliary files (clip_l, t5xxl, vae, taesd, …) accept one of:
#   - a local path (absolute or "~/…")
#   - an hf:// URL of the form hf://<owner>/<repo>/<filepath-in-repo>
# llamaconfig auto-downloads hf:// references into the cache on `up`.

version: 1
name: my-sd-model
description: ""
tags: []                          # e.g. [flux, sdxl, sd15]

backend: sd
mode: interactive                 # interactive → sd-cli (generates to file)

# ── Model ─────────────────────────────────────────────────────────────────────
# Example A — SD1.5 unified checkpoint (single file)
# model:
#   source: url
#   url: https://huggingface.co/runwayml/stable-diffusion-v1-5/resolve/main/v1-5-pruned-emaonly.safetensors
#   file: v1-5-pruned-emaonly.safetensors

# Example B — Flux.1-schnell (diffusion weights + separate encoders below)
model:
  source: huggingface
  repo: city96/FLUX.1-schnell-gguf
  file: flux1-schnell-Q4_0.gguf
  download:
    resume: true
    verify_checksum: false

# ── Hardware Profiles ─────────────────────────────────────────────────────────

hardware_profiles:
  nvidia:
    n_gpu_layers: 99
    cuda: true
    threads: 8
  apple_silicon:
    n_gpu_layers: 99
    metal: true
    threads: 8
  cpu:
    n_gpu_layers: 0
    threads: 8

# ── Stable Diffusion ──────────────────────────────────────────────────────────

sd:
  # --- Output (cli mode) ---
  output: ./output.png            # supports %d for sequences: output_%03d.png
  # preview: none                 # none | proj | tae | vae
  # preview_path: ./preview.png
  # mode: img_gen                 # img_gen | vid_gen | upscale | convert | metadata

  # --- Auxiliary model components (required for Flux / SD3) ---
  # Use hf://<repo>/<file> for auto-download, or a local path. For Flux.1
  # these three unlock the pipeline; `model.file` is the main GGUF above.
  vae:    hf://black-forest-labs/FLUX.1-schnell/ae.safetensors
  clip_l: hf://comfyanonymous/flux_text_encoders/clip_l.safetensors
  t5xxl:  hf://comfyanonymous/flux_text_encoders/t5xxl_fp16.safetensors
  # t5xxl:  hf://comfyanonymous/flux_text_encoders/t5xxl_fp8_e4m3fn.safetensors  # ~5 GB, tight VRAM
  # clip_g: ""                    # SDXL/SD3 only
  # taesd: ""                     # Tiny AutoEncoder (fast preview decode)
  # control_net: ""
  # photo_maker: ""
  # upscale_model: ""
  # lora_model_dir: ""
  # embd_dir: ""
  # diffusion_model: ""           # set this to override the auto-routing

  # --- Hardware ---
  # type: ""                      # weight type: f32 | f16 | q4_0 | q8_0 | ...
  # offload_to_cpu: false         # offload weights to RAM, load to VRAM on demand
  # vae_on_cpu: false
  # clip_on_cpu: false
  flash_attention: false          # true = --fa (enable flash attention)

  # --- Generation defaults (Flux defaults shown; for SD1.5 use 512² / steps:20 / cfg:7 / euler_a) ---
  width: 1024
  height: 1024
  steps: 4                        # schnell finishes in ~4 steps
  cfg_scale: 1.0                  # Flux guidance-distilled; cfg≈1.0
  guidance: 3.5                   # distilled guidance (Flux/SD3)
  # strength: 0.75                # img2img noise strength
  # negative_prompt: ""
  # batch_count: 1
  sampling_method: euler          # euler | euler_a | heun | dpm++2m | dpm++2s_a | lcm | tcd | ...
  # scheduler: discrete           # discrete | karras | exponential | ays | gits | ...
  seed: -1                        # -1 = random

  # --- VAE tiling (reduce VRAM for high-res) ---
  # vae_tiling: false
  # vae_tile_size: 32x32

  # --- Logging ---
  # verbose: false
