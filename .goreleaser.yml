version: 2

project_name: llamaconfig

before:
  hooks:
    - go mod tidy

builds:
  - id: llamaconfig
    binary: llamaconfig
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.CommitDate}}
    main: .
  # Same source, published under the `llmc` short name so release archives
  # ship a ready-to-use alias. Cobra reads os.Args[0] for the command name
  # so the binary behaves identically when invoked as either name.
  - id: llmc
    binary: llmc
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.CommitDate}}
    main: .

archives:
  - ids:
      - llamaconfig
      - llmc
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    files:
      - README.md
      - config.reference.yaml
      # Ship only the scripts that make sense for the target OS:
      # .ps1 on Windows, .sh on Linux/macOS.
      - src: "install.{{ if eq .Os \"windows\" }}ps1{{ else }}sh{{ end }}"
      - src: "uninstall.{{ if eq .Os \"windows\" }}ps1{{ else }}sh{{ end }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: kiliczsh
    name: llamaconfig
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
